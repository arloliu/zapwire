name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. when a PR branch is updated).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            otlp/go.sum
            otlp/internal/conformance/go.sum
            .golangci-lint.go.sum

      # Builds and runs the pinned golangci-lint (v2.11.4) via `go tool`,
      # exactly as the local `make lint` gate does.
      - name: Lint
        run: make lint

  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Minimum supported version (the go.mod directive) and the latest
        # stable release — the two-release support window the README's
        # stability statement promises.
        go: ["1.25.x", "stable"]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: |
            go.sum
            otlp/go.sum
            otlp/internal/conformance/go.sum
            examples/go.sum

      - name: Vet
        run: make vet

      - name: Test (race)
        run: make test

      - name: Coverage
        run: make coverage

      # The examples live in their own module (examples/go.mod); build + vet them
      # so they are guarded against API drift, mirroring `make ci`.
      - name: Build & vet examples
        run: make examples

  apicompat:
    name: API compatibility (gorelease)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # gorelease diffs each module's exported API against its latest release
      # on the module proxy and fails this job on incompatible changes. A
      # DELIBERATE breaking change (pre-v1) should land with a changelog entry
      # and may temporarily relax this step in the same PR — the gate exists
      # so a break is always an explicit decision, never an accident.
      - name: gorelease (root module)
        run: |
          out=$(go run golang.org/x/exp/cmd/gorelease@latest 2>&1) || true
          echo "$out"
          if echo "$out" | grep -q "incompatible changes"; then
            echo "::error::incompatible API changes in the root module"; exit 1
          fi

      # TEMPORARY (otlp/v0.4.0): NewWriter/NewCore were removed pre-v1 — a
      # DELIBERATE breaking change (see CHANGELOG "otlp (v0.4.0)"). gorelease
      # reports "incompatible changes" against the v0.3.0 base until v0.4.0 is
      # tagged, at which point HEAD matches the base and the break is gone.
      # This step still runs and prints the diff, but does not fail the job.
      # RESTORE the hard `exit 1` in the commit after otlp/v0.4.0 is released.
      - name: gorelease (otlp module)
        working-directory: otlp
        run: |
          out=$(go run golang.org/x/exp/cmd/gorelease@latest 2>&1) || true
          echo "$out"
          if echo "$out" | grep -q "incompatible changes"; then
            echo "::warning::expected incompatible API changes in otlp (pre-v1 v0.4.0 removal of NewWriter/NewCore); gate relaxed until the tag lands"
          fi

  integration:
    name: Integration (Fluent Bit)
    runs-on: ubuntu-latest
    env:
      FLUENT_BIT_VERSION: "5.0.6"
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # Cache the self-contained /opt/fluent-bit tree so the apt download is
      # skipped on warm runners. Key includes the version so a deliberate bump
      # busts the cache automatically.
      - name: Cache Fluent Bit
        id: cache-fluentbit
        uses: actions/cache@v4
        with:
          path: /opt/fluent-bit
          key: fluent-bit-${{ env.FLUENT_BIT_VERSION }}-${{ runner.os }}

      # The official installer adds the Fluent Bit apt repo and installs the
      # binary to /opt/fluent-bit/bin/fluent-bit. Pin the version (the script
      # reads FLUENT_BIT_RELEASE_VERSION) so an upstream release can never change
      # the decoded output our assertions match; bump it deliberately.
      - name: Install Fluent Bit
        if: steps.cache-fluentbit.outputs.cache-hit != 'true'
        run: curl -fsSL https://raw.githubusercontent.com/fluent/fluent-bit/master/install.sh | sh
        env:
          FLUENT_BIT_RELEASE_VERSION: ${{ env.FLUENT_BIT_VERSION }}

      # Runs the opt-in `fluentbit`-tagged tests against the real binary, proving
      # zapwire's Fluent Forward frames stay interoperable end to end.
      - name: Integration tests (real Fluent Bit)
        run: make integration
        env:
          ZAPWIRE_FLUENT_BIT_BIN: /opt/fluent-bit/bin/fluent-bit

      # Proves zapwire's OTLP exporters (HTTP and gRPC, both directions:
      # ingest + relay fidelity) interoperate with Fluent Bit's
      # `opentelemetry` input/output, reusing the binary installed above.
      - name: Integration tests (Fluent Bit OTLP)
        run: make integration-fluentbit
        env:
          ZAPWIRE_FLUENT_BIT_BIN: /opt/fluent-bit/bin/fluent-bit

  integration-otlp:
    name: Integration (otel-collector, Vector)
    runs-on: ubuntu-latest
    env:
      OTELCOL_VERSION: "0.154.0"
      VECTOR_VERSION: "0.56.0"
      # Stable paths under HOME so actions/cache can restore them across runs.
      OTELCOL_BIN: /home/runner/tools/otelcol-contrib
      VECTOR_BIN: /home/runner/tools/vector
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            otlp/go.sum

      # Pin both receiver versions so an upstream release can never change the
      # behavior our assertions match; bump them deliberately. otelcol-contrib
      # (not core) because the tests use the `file` exporter, which only ships
      # in the contrib distribution.
      - name: Cache otel-collector
        id: cache-otelcol
        uses: actions/cache@v4
        with:
          path: /home/runner/tools/otelcol-contrib
          key: otelcol-contrib-${{ env.OTELCOL_VERSION }}-${{ runner.os }}

      - name: Install otel-collector
        if: steps.cache-otelcol.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o /tmp/otelcol.tar.gz \
            https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v${{ env.OTELCOL_VERSION }}/otelcol-contrib_${{ env.OTELCOL_VERSION }}_linux_amd64.tar.gz
          tar -xzf /tmp/otelcol.tar.gz -C /tmp otelcol-contrib
          mkdir -p /home/runner/tools
          mv /tmp/otelcol-contrib /home/runner/tools/otelcol-contrib

      - name: Cache Vector
        id: cache-vector
        uses: actions/cache@v4
        with:
          path: /home/runner/tools/vector
          key: vector-${{ env.VECTOR_VERSION }}-${{ runner.os }}

      - name: Install Vector
        if: steps.cache-vector.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o /tmp/vector.tar.gz \
            https://github.com/vectordotdev/vector/releases/download/v${{ env.VECTOR_VERSION }}/vector-${{ env.VECTOR_VERSION }}-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf /tmp/vector.tar.gz -C /tmp
          mkdir -p /home/runner/tools
          mv /tmp/vector-x86_64-unknown-linux-gnu/bin/vector /home/runner/tools/vector

      - name: Verify tools
        run: |
          ${{ env.OTELCOL_BIN }} --version
          ${{ env.VECTOR_BIN }} --version

      # OTLP/HTTP + OTLP/gRPC (h2c and TLS) against a real otel-collector.
      - name: Integration tests (otel-collector)
        run: make integration-otel

      # OTLP/HTTP + OTLP/gRPC against a real Vector `opentelemetry` source.
      - name: Integration tests (Vector)
        run: make integration-vector
